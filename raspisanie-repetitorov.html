<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Расписание репетиторов</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #121214;
    --surface: #1A1B1E;
    --surface-2: #212227;
    --ink: #EDEDE8;
    --ink-soft: #8B8C92;
    --ink-dim: #5C5D63;
    --work: #FF8A3D;
    --work-ink: #1C1006;
    --off: #2B2C31;
    --off-ink: #B7B8BD;
    --border: #2C2D31;
    --danger: #FF6B5E;
    --radius: 14px;
    --radius-sm: 10px;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .app{
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    min-height: 100%;
  }

  /* Header */
  .header{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1{
    font-family: 'Newsreader', serif;
    font-weight: 600;
    font-size: 26px;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .today-btn{
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink-soft);
    font-family: inherit;
    font-size: 13px;
    padding: 6px 13px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .today-btn:hover{ border-color: var(--work); color: var(--work); }

  /* Month nav */
  .month-nav{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .month-label{
    font-size: 14px;
    color: var(--ink-soft);
    text-transform: capitalize;
  }
  .nav-arrows{ display:flex; gap:6px; }
  .arrow-btn{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    color: var(--ink);
    transition: all .15s ease;
  }
  .arrow-btn:hover{ background: var(--surface-2); border-color: var(--work); color: var(--work); }
  .arrow-btn svg{ width:14px; height:14px; }

  /* Week strip */
  .week-strip{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 20px;
  }
  .day-card{
    position: relative;
    background: var(--work);
    border: 1.5px solid transparent;
    border-radius: 12px;
    padding: 8px 4px 7px;
    text-align: center;
    cursor: pointer;
    transition: all .15s ease;
    overflow: hidden;
  }
  .day-card.selected{
    border-color: var(--ink);
    box-shadow: 0 0 0 1px var(--ink);
  }
  .day-card.off{
    background: var(--off);
  }
  .day-card .wd{
    font-size: 11px;
    color: var(--work-ink);
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .day-card.off .wd{ color: var(--ink-soft); opacity: 1; }
  .day-card .dn{
    font-family: 'Newsreader', serif;
    font-size: 19px;
    font-weight: 500;
    position: relative;
    display: inline-block;
    color: var(--work-ink);
  }
  .day-card.off .dn{ color: var(--off-ink); }
  .day-card.is-today{ box-shadow: 0 0 0 2px var(--ink) inset; }
  .dot{
    width:4px; height:4px;
    border-radius:50%;
    background: var(--work-ink);
    opacity: 0.6;
    margin: 4px auto 0;
    visibility: hidden;
  }
  .day-card.off .dot{ background: var(--ink-soft); opacity: 1; }
  .day-card.has-lessons .dot{ visibility: visible; }

  /* Detail panel */
  .panel{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .panel-head{
    display:flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .panel-date{
    font-family: 'Newsreader', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
  }
  .panel-date .y{ color: var(--ink-soft); font-size: 14px; }

  .toggle-wrap{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .toggle-label{ font-size: 12px; color: var(--ink-soft); }
  .switch{
    width: 38px; height: 22px;
    border-radius: 20px;
    background: var(--off);
    position: relative;
    cursor: pointer;
    transition: background .18s ease;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .switch.on{ background: var(--work); border-color: var(--work); }
  .switch .knob{
    position: absolute;
    top: 1px; left: 1px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--ink);
    transition: transform .18s ease;
  }
  .switch.on .knob{ transform: translateX(16px); background: var(--work-ink); }

  .lessons-list{
    display:flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }
  .lesson-card{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 11px 12px;
    background: var(--surface-2);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .lesson-time{
    font-family: 'Newsreader', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--work);
    min-width: 44px;
  }
  .tutor-dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .lesson-info{ flex: 1; min-width: 0; }
  .lesson-tutor{
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lesson-subject{
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .del-btn{
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    padding: 4px;
    display:flex;
    opacity: 0.6;
    transition: opacity .15s ease, color .15s ease;
  }
  .del-btn:hover{ opacity: 1; color: var(--danger); }
  .del-btn svg{ width:15px; height:15px; }

  .empty-state{
    text-align:center;
    padding: 28px 10px;
    color: var(--ink-soft);
    font-size: 13.5px;
  }

  .add-btn{
    width:100%;
    background: var(--work);
    color: var(--work-ink);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 6px;
    transition: opacity .15s ease;
  }
  .add-btn:hover{ opacity: 0.88; }
  .add-btn:disabled{ opacity: 0.4; cursor: not-allowed; }

  /* Modal */
  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .overlay.show{ display: flex; }
  .modal{
    background: var(--surface);
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 20px;
    animation: slideup .2s ease;
  }
  @keyframes slideup{ from{ transform: translateY(30px); opacity:0; } to{ transform: translateY(0); opacity:1; } }
  .modal h2{
    font-family: 'Newsreader', serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 16px;
    color: var(--ink);
  }
  .field{ margin-bottom: 12px; }
  .field label{
    display:block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 5px;
  }
  .field input{
    width: 100%;
    padding: 10px 12px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    font-family: inherit;
    font-size: 14px;
    background: var(--surface-2);
    color: var(--ink);
  }
  .field input:focus{
    outline: none;
    border-color: var(--work);
  }
  .field input::-webkit-calendar-picker-indicator{ filter: invert(0.8); }
  .field-row{ display:flex; gap: 10px; }
  .field-row .field{ flex: 1; }
  .modal-actions{
    display:flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-cancel, .btn-save{
    flex:1;
    padding: 12px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }
  .btn-cancel{
    background: var(--surface-2);
    color: var(--ink-soft);
    border: 1.5px solid var(--border);
  }
  .btn-save{
    background: var(--work);
    color: var(--work-ink);
  }
  .btn-save:disabled{ opacity: 0.4; cursor: not-allowed; }

  .loading{
    text-align: center;
    padding: 60px 0;
    color: var(--ink-soft);
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading" id="loading">Загрузка расписания…</div>
</div>

<script>
const WEEKDAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONTHS_NOM = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const TUTOR_COLORS = ['#5EA8ED','#F2B84B','#6FCF97','#C98BE0','#FF8A7A','#59C2C2'];

let state = { dayStatus: {}, lessons: {} };
let currentWeekStart = null;
let selectedDate = null;
let storageReady = false;

function dateKey(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isSameDay(a,b){ return dateKey(a) === dateKey(b); }
function startOfWeek(d){
  const nd = new Date(d);
  const day = (nd.getDay() + 6) % 7; // Monday = 0
  nd.setDate(nd.getDate() - day);
  nd.setHours(0,0,0,0);
  return nd;
}
function addDays(d, n){
  const nd = new Date(d);
  nd.setDate(nd.getDate() + n);
  return nd;
}
function tutorColor(name){
  let hash = 0;
  for(let i=0;i<name.length;i++){ hash = name.charCodeAt(i) + ((hash<<5)-hash); }
  return TUTOR_COLORS[Math.abs(hash) % TUTOR_COLORS.length];
}

async function loadData(){
  try{
    const res = await window.storage.get('schedule-data', false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      state.dayStatus = parsed.dayStatus || {};
      state.lessons = parsed.lessons || {};
    }
  }catch(e){
    // key doesn't exist yet — start fresh
    state = { dayStatus: {}, lessons: {} };
  }
  storageReady = true;
}

async function saveData(){
  try{
    await window.storage.set('schedule-data', JSON.stringify(state), false);
  }catch(e){
    console.error('Не удалось сохранить расписание', e);
  }
}

function isDayOff(key){
  return state.dayStatus[key] === false;
}
function toggleDay(key){
  const currentlyOff = isDayOff(key);
  state.dayStatus[key] = currentlyOff ? true : false;
  saveData();
  render();
}
function getLessons(key){
  return (state.lessons[key] || []).slice().sort((a,b) => a.time.localeCompare(b.time));
}
function addLesson(key, lesson){
  if(!state.lessons[key]) state.lessons[key] = [];
  state.lessons[key].push(lesson);
  saveData();
  render();
}
function deleteLesson(key, id){
  state.lessons[key] = (state.lessons[key] || []).filter(l => l.id !== id);
  saveData();
  render();
}

function renderApp(){
  const app = document.getElementById('app');
  const weekDates = [...Array(7)].map((_, i) => addDays(currentWeekStart, i));
  const today = new Date();
  const firstMonth = MONTHS_NOM[weekDates[0].getMonth()];
  const lastMonth = MONTHS_NOM[weekDates[6].getMonth()];
  const monthLabel = firstMonth === lastMonth
    ? `${firstMonth} ${weekDates[0].getFullYear()}`
    : `${firstMonth} — ${lastMonth} ${weekDates[6].getFullYear()}`;

  const selKey = dateKey(selectedDate);
  const selOff = isDayOff(selKey);
  const selLessons = getLessons(selKey);
  const selDate = selectedDate;

  app.innerHTML = `
    <div class="header">
      <h1>Расписание</h1>
      <button class="today-btn" id="todayBtn">Сегодня</button>
    </div>

    <div class="month-nav">
      <div class="month-label">${monthLabel}</div>
      <div class="nav-arrows">
        <button class="arrow-btn" id="prevWeek" aria-label="Предыдущая неделя">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="arrow-btn" id="nextWeek" aria-label="Следующая неделя">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>

    <div class="week-strip">
      ${weekDates.map((d, i) => {
        const k = dateKey(d);
        const off = isDayOff(k);
        const hasLessons = getLessons(k).length > 0;
        const isToday = isSameDay(d, today);
        const isSelected = isSameDay(d, selDate);
        return `
          <div class="day-card ${off ? 'off' : ''} ${isToday ? 'is-today' : ''} ${isSelected ? 'selected' : ''} ${hasLessons ? 'has-lessons' : ''}" data-date="${k}">
            <div class="wd">${WEEKDAYS[i]}</div>
            <div class="dn">${d.getDate()}</div>
            <div class="dot"></div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-date">${selDate.getDate()} ${MONTHS[selDate.getMonth()]} <span class="y">${selDate.getFullYear()}</span></div>
        <div class="toggle-wrap">
          <span class="toggle-label">${selOff ? 'Выходной' : 'Рабочий'}</span>
          <div class="switch ${selOff ? '' : 'on'}" id="dayToggle"><div class="knob"></div></div>
        </div>
      </div>

      ${selLessons.length === 0 ? `
        <div class="empty-state">Занятий пока нет.<br>Добавьте первое занятие на этот день.</div>
      ` : `
        <div class="lessons-list">
          ${selLessons.map(l => `
            <div class="lesson-card">
              <div class="lesson-time">${l.time}</div>
              <div class="tutor-dot" style="background:${tutorColor(l.tutor)}"></div>
              <div class="lesson-info">
                <div class="lesson-tutor">${escapeHtml(l.tutor)}</div>
                <div class="lesson-subject">${escapeHtml(l.subject)}</div>
              </div>
              <button class="del-btn" data-id="${l.id}" data-key="${selKey}" aria-label="Удалить занятие">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
              </button>
            </div>
          `).join('')}
        </div>
      `}

      <button class="add-btn" id="addLessonBtn">+ Добавить занятие</button>
    </div>
  `;

  document.getElementById('prevWeek').onclick = () => { currentWeekStart = addDays(currentWeekStart, -7); render(); };
  document.getElementById('nextWeek').onclick = () => { currentWeekStart = addDays(currentWeekStart, 7); render(); };
  document.getElementById('todayBtn').onclick = () => {
    selectedDate = new Date();
    currentWeekStart = startOfWeek(selectedDate);
    render();
  };
  document.getElementById('dayToggle').onclick = () => toggleDay(selKey);
  document.getElementById('addLessonBtn').onclick = () => openModal(selKey);

  document.querySelectorAll('.day-card').forEach(card => {
    card.onclick = () => {
      const k = card.getAttribute('data-date');
      const [y,m,dd] = k.split('-').map(Number);
      selectedDate = new Date(y, m-1, dd);
      render();
    };
  });

  document.querySelectorAll('.del-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      deleteLesson(btn.getAttribute('data-key'), btn.getAttribute('data-id'));
    };
  });
}

function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function openModal(key){
  const overlay = document.createElement('div');
  overlay.className = 'overlay show';
  overlay.innerHTML = `
    <div class="modal">
      <h2>Новое занятие</h2>
      <div class="field">
        <label>Репетитор</label>
        <input type="text" id="mTutor" placeholder="Имя репетитора" autocomplete="off">
      </div>
      <div class="field">
        <label>Предмет</label>
        <input type="text" id="mSubject" placeholder="Например, математика" autocomplete="off">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Дата</label>
          <input type="date" id="mDate" value="${key}">
        </div>
        <div class="field">
          <label>Время</label>
          <input type="time" id="mTime" value="15:00">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="mCancel">Отмена</button>
        <button class="btn-save" id="mSave" disabled>Сохранить</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const tutorInput = overlay.querySelector('#mTutor');
  const subjectInput = overlay.querySelector('#mSubject');
  const dateInput = overlay.querySelector('#mDate');
  const timeInput = overlay.querySelector('#mTime');
  const saveBtn = overlay.querySelector('#mSave');

  function validate(){
    saveBtn.disabled = !(tutorInput.value.trim() && subjectInput.value.trim() && dateInput.value && timeInput.value);
  }
  [tutorInput, subjectInput, dateInput, timeInput].forEach(inp => inp.addEventListener('input', validate));

  overlay.querySelector('#mCancel').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };

  saveBtn.onclick = () => {
    const lesson = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      tutor: tutorInput.value.trim(),
      subject: subjectInput.value.trim(),
      time: timeInput.value
    };
    addLesson(dateInput.value, lesson);
    overlay.remove();
  };

  tutorInput.focus();
}

function render(){
  renderApp();
}

async function init(){
  await loadData();
  const today = new Date();
  selectedDate = today;
  currentWeekStart = startOfWeek(today);
  render();
}

init();
</script>
</body>
</html>
